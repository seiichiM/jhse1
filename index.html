<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中1英単語 タイピング練習 (完全網羅版)</title>
    <style>
        :root {
            --primary-color: #4a90e2;
            --bg-color: #f4f7f9;
            --card-bg: #ffffff;
            --text-color: #333;
            --correct-color: #4caf50;
            --error-color: #f44336;
        }

        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background-color: var(--card-bg);
            padding: 2rem;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 500px;
            text-align: center;
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            color: var(--primary-color);
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 1.5rem;
            font-weight: bold;
            font-size: 0.9rem;
        }

        .word-display {
            font-size: 3rem;
            font-weight: bold;
            margin-bottom: 1rem;
            min-height: 4.5rem;
            display: flex;
            justify-content: center;
            align-items: center;
            letter-spacing: 2px;
        }

        .meaning-display {
            font-size: 1.5rem;
            color: #666;
            margin-bottom: 1.5rem;
            min-height: 2rem;
            height: 2rem;
        }

        .input-area {
            position: relative;
            margin-bottom: 1.5rem;
        }

        input[type="text"], select {
            width: 100%;
            padding: 12px 16px;
            font-size: 1.2rem;
            border: 2px solid #ddd;
            border-radius: 8px;
            outline: none;
            transition: border-color 0.3s;
            text-align: center;
            box-sizing: border-box;
        }

        select {
            margin-bottom: 1.5rem;
            cursor: pointer;
        }

        input[type="text"]:focus, select:focus {
            border-color: var(--primary-color);
        }

        .input-area.correct input {
            border-color: var(--correct-color);
            background-color: #e8f5e9;
        }

        .input-area.error input {
            border-color: var(--error-color);
            background-color: #ffebee;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 1rem;
        }

        button {
            padding: 10px 20px;
            font-size: 1rem;
            cursor: pointer;
            border: none;
            border-radius: 8px;
            transition: opacity 0.2s, transform 0.1s;
        }

        button:active {
            transform: scale(0.98);
        }

        .btn-start {
            background-color: var(--primary-color);
            color: white;
            width: 100%;
            font-size: 1.2rem;
            padding: 12px;
        }

        .btn-reset {
            background-color: #999;
            color: white;
        }

        .hidden {
            display: none;
        }

        .settings-label {
            display: block;
            text-align: left;
            margin-bottom: 0.5rem;
            font-weight: bold;
            color: #555;
            font-size: 0.9rem;
        }

        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
        .animate-pop {
            animation: pop 0.3s ease-out;
        }
    </style>

    <!-- PWA Settings -->
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="icon-192.png">
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('service-worker.js');
        }
    </script>
</head>
<body>

<div class="container">
    <h1>JHS 1 English Typing</h1>
    
    <div id="game-ui" class="hidden">
        <div class="stats">
            <span>正解: <span id="score">0</span></span>
            <span>残り: <span id="remaining">0</span></span>
        </div>

        <div id="word-display" class="word-display">---</div>
        <div id="meaning-display" class="meaning-display"></div>

        <div class="input-area" id="input-container">
            <input type="text" id="word-input" placeholder="タイプしてね!" autocomplete="off">
        </div>

        <div class="controls">
            <button class="btn-reset" onclick="resetGame()">やめる</button>
        </div>
    </div>

    <div id="start-ui">
        <p>中1英単語タイピング練習</p>
        <p style="font-size: 0.9rem; color: #666; margin-bottom: 1.5rem;">
            単語が表示されたらスペルをタイピングしてください。<br>正解すると意味が表示されます。
        </p>
        
        <div>
            <label class="settings-label" for="question-count">出題数を選んでください：</label>
            <select id="question-count">
                <option value="10">10問 (サクッと練習)</option>
                <option value="30">30問 (しっかり練習)</option>
                <option value="50">50問 (がっつり練習)</option>
                <option value="100">100問 (テスト前対策)</option>
                <option value="all">全問 (限界に挑戦！)</option>
            </select>
        </div>

        <button class="btn-start" onclick="startGame()">スタート</button>
        <p style="font-size: 0.8rem; color: #999; margin-top: 1rem;">収録単語数: <span id="total-words-count">0</span>語 (中1網羅版)</p>
    </div>
</div>

    document.addEventListener("DOMContentLoaded", () => {
        document.getElementById('total-words-count').textContent = wordList.length;
    });

    let currentWordIndex = 0;
    let score = 0;
    let gameWords = [];
    let currentWord = null;

    const startUI = document.getElementById('start-ui');
    const gameUI = document.getElementById('game-ui');
    const wordDisplay = document.getElementById('word-display');
    const meaningDisplay = document.getElementById('meaning-display');
    const wordInput = document.getElementById('word-input');
    const scoreDisplay = document.getElementById('score');
    const remainingDisplay = document.getElementById('remaining');
    const inputContainer = document.getElementById('input-container');
    const countSelect = document.getElementById('question-count');

    function startGame() {
        let shuffled = [...wordList].sort(() => Math.random() - 0.5);
        
        const selectedCount = countSelect.value;
        if (selectedCount === 'all') {
            gameWords = shuffled;
        } else {
            gameWords = shuffled.slice(0, parseInt(selectedCount, 10));
        }

        currentWordIndex = 0;
        score = 0;
        scoreDisplay.textContent = score;
        
        startUI.classList.add('hidden');
        gameUI.classList.remove('hidden');
        
        nextWord();
        wordInput.focus();
    }

    function nextWord() {
        if (currentWordIndex >= gameWords.length) {
            endGame();
            return;
        }

        currentWord = gameWords[currentWordIndex];
        wordDisplay.textContent = currentWord.word;
        meaningDisplay.textContent = "";
        wordInput.value = "";
        inputContainer.classList.remove('correct', 'error');
        remainingDisplay.textContent = gameWords.length - currentWordIndex;
        
        wordDisplay.classList.remove('animate-pop');
        void wordDisplay.offsetWidth;
        wordDisplay.classList.add('animate-pop');
    }

    function endGame() {
        gameUI.classList.add('hidden');
        startUI.classList.remove('hidden');
        alert(`ゲーム終了！\n正解数: ${score} / ${gameWords.length}`);
    }

    function resetGame() {
        if(confirm("途中でやめてスタート画面に戻りますか？")) {
            gameUI.classList.add('hidden');
            startUI.classList.remove('hidden');
        }
    }

    wordInput.addEventListener('input', (e) => {
        const typedText = e.target.value;
        
        if (typedText.toLowerCase() === currentWord.word.toLowerCase()) {
            score++;
            scoreDisplay.textContent = score;
            inputContainer.classList.add('correct');
            meaningDisplay.textContent = currentWord.meaning;
            
            setTimeout(() => {
                currentWordIndex++;
                nextWord();
                wordInput.focus();
            }, 1000);
        } else if (currentWord.word.toLowerCase().startsWith(typedText.toLowerCase())) {
            inputContainer.classList.remove('error');
        } else {
            inputContainer.classList.add('error');
        }
    });
